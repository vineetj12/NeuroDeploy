services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - REDIS_URL=redis://host.docker.internal:6379

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: on-failure
    environment:
      - REDIS_URL=redis://host.docker.internal:6379

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "http://host.docker.internal:4000/api"
    ports:
      - "8080:80"
    depends_on:
      - backend
