steps:
# Build and push backend image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/neurodeploy-backend:$COMMIT_SHA', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/neurodeploy-backend:$COMMIT_SHA']

# Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - 'run'
    - 'deploy'
    - 'neurodeploy-backend'
    - '--image'
    - 'gcr.io/$PROJECT_ID/neurodeploy-backend:$COMMIT_SHA'
    - '--region'
    - '${_REGION}'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'
    - '--set-env-vars'
    - 'DATABASE_URL=${_DATABASE_URL},REDIS_URL=${_REDIS_URL},JWT_SECRET=${_JWT_SECRET},GEMINI_API_KEY=${_GEMINI_API_KEY},FRONTEND_ORIGIN=${_FRONTEND_ORIGIN}'

images:
  - 'gcr.io/$PROJECT_ID/neurodeploy-backend:$COMMIT_SHA'

substitutions:
  _REGION: 'us-central1'
  _DATABASE_URL: ''
  _REDIS_URL: ''
  _JWT_SECRET: ''
  _GEMINI_API_KEY: ''
  _FRONTEND_ORIGIN: ''

timeout: 1200s
